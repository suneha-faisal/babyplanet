<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/baby-logo.avif">
            <div class="search-container">
                <input type="text" placeholder="Search for products" />
                <button>search</button>
            </div>
            <div class="icon">
                <i class="fa-regular fa-user"></i>
                <i class="fa-regular fa-heart"></i>
                <i class="fa-solid fa-cart-shopping"></i>
                <div class="para">RS.0</div>
            </div>
        </div>

        <div class="panel-ops">
            <p>HOME</p>
            <p>FASHION</p>
            <p>GEAR</p>
            <p>FEEDING</p>
            <p>BATH</p>
            <p>SAFTY</p>
            <p>TOYS</p>
            <p>DIAPERING</p>
            <p>NURSERY</p>
            <p>MOM</p>
            <p>SCHOOL</p>
            <p>BIRTHDAY</p>
            <p>HOME ARRIVAL</p>
        </div>
        <div class="hero-section">
            <img src="images/hero-1.webp">
        </div>
    </header>
    <div class="shop-section">
        <div class="box1 box">
            <div class="box-img" style="background-image: url('images/hero-2.webp');"></div>
        </div>
        <div class="box2 box">
            <div class="box-img" style="background-image: url('images/hero-3.webp');"></div>
        </div>
        <div class="box3 box">
            <div class="box-img" style="background-image: url('images/hero-4.webp');"></div>
        </div>
        <div class="box4 box">
            <div class="box-img" style="background-image: url('images/hero-5.webp');"></div>
        </div>
    </div>
    <div class="line">
        <hr width="25%">
        <h2>Best Seller </h2>
        <p>Enjoy the all best product </p>
        <hr width="25%">
    </div>


</body>

</html>
